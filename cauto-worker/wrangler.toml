name            = "opsonata-worker"
main            = "src/index.js"
compatibility_date  = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding      = "DB"
database_name = "opsonata-db"
database_id  = "3b5e5f2b-7aa2-4317-9a94-8588902561d1"

[[kv_namespaces]]
binding = "SESSIONS"
id      = "3c1caba8ff8741158ef750ca09493b8a"

[[r2_buckets]]
binding    = "MEDIA"
bucket_name = "opsonata-media"

[triggers]
crons = ["0 6 * * *", "0 2 * * *"]   # 06:00 UTC PM/license check | 02:00 UTC budget actuals

[vars]
ENVIRONMENT        = "production"
GPS_PROVIDER       = "mock"            # "mock" | "geotab"
GEOTAB_SERVER      = "my.geotab.com"
GEOTAB_DATABASE    = "demo_opsonata_demo"
# Secrets to add in Cloudflare dashboard (Workers → opsonata-worker → Settings → Variables):
#   GEOTAB_USERNAME   erwankervazo@gmail.com
#   GEOTAB_PASSWORD   (the password)
DEFAULT_TENANT_ID  = "cauto"   # Tenant assigned to new Azure SSO users on first login
# These are not secret — they match the values already public in the frontend msalConfig.js
AZURE_CLIENT_ID    = "5dcaf286-6c13-42fc-99f0-94e991d86354"
AZURE_TENANT_ID    = "65e803c0-672a-4162-85a7-e1a402843bd2"
# Set these as Secrets in the Cloudflare dashboard (never in this file):
# JWT_SECRET
# FRONTEND_URL              ← https://app.opsonata.com (or your Cloudflare Pages URL)
# SEED_SECRET              ← one-time password seeding key
# SEED_SUPERADMIN_PASSWORD
# SEED_OFFICINA_PASSWORD
# SEED_ADMIN_PASSWORD
