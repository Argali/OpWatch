name: Deploy — Frontend + Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── 1. Unit tests ─────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cauto-frontend/package-lock.json

      - name: Install
        working-directory: cauto-frontend
        run: npm ci --legacy-peer-deps

      - name: Unit tests
        working-directory: cauto-frontend
        run: npm test

  # ── 2. Deploy Worker to Cloudflare ───────────────────────────────────────────
  deploy-worker:
    needs: test
    runs-on: ubuntu-latest
    if: ${{ vars.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cauto-worker/package-lock.json

      - name: Install worker deps
        working-directory: cauto-worker
        run: npm ci

      - name: Deploy worker
        working-directory: cauto-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

  # ── 3a. Build for GitHub Pages (BASE_PATH = /OpSonata) ───────────────────────
  build-github:
    needs: test
    runs-on: ubuntu-latest
    if: ${{ vars.CLOUDFLARE_ACCOUNT_ID == '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cauto-frontend/package-lock.json

      - name: Install
        working-directory: cauto-frontend
        run: npm ci --legacy-peer-deps

      - name: Build (GitHub Pages — BASE_PATH /OpSonata)
        working-directory: cauto-frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          BASE_PATH: /OpSonata
        run: npm run build

      - name: Validate build
        working-directory: cauto-frontend
        run: |
          test -f dist/index.html || (echo "ERROR: dist/index.html missing" && exit 1)
          ENTRY=$(find dist/assets -name 'index-*.js' | head -1)
          if [ -z "$ENTRY" ]; then echo "ERROR: no entry chunk found" && exit 1; fi
          SIZE=$(gzip -c "$ENTRY" | wc -c)
          echo "Entry chunk gzipped: ${SIZE} bytes"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-github
          path: cauto-frontend/dist
          retention-days: 1

  # ── 3b. Build for Cloudflare Pages (BASE_PATH = /) ───────────────────────────
  build-cloudflare:
    needs: test
    runs-on: ubuntu-latest
    if: ${{ vars.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cauto-frontend/package-lock.json

      - name: Install
        working-directory: cauto-frontend
        run: npm ci --legacy-peer-deps

      - name: Build (Cloudflare Pages — BASE_PATH /)
        working-directory: cauto-frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          BASE_PATH: /
        run: npm run build

      - name: Validate build
        working-directory: cauto-frontend
        run: |
          test -f dist/index.html || (echo "ERROR: dist/index.html missing" && exit 1)
          ENTRY=$(find dist/assets -name 'index-*.js' | head -1)
          if [ -z "$ENTRY" ]; then echo "ERROR: no entry chunk found" && exit 1; fi
          SIZE=$(gzip -c "$ENTRY" | wc -c)
          echo "Entry chunk gzipped: ${SIZE} bytes"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-cloudflare
          path: cauto-frontend/dist
          retention-days: 1

  # ── 4a. Deploy to GitHub Pages ────────────────────────────────────────────────
  deploy-pages-github:
    needs: build-github
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-github
          path: cauto-frontend/dist

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: cauto-frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── 4b. Deploy to Cloudflare Pages ───────────────────────────────────────────
  deploy-pages-cloudflare:
    needs: build-cloudflare
    runs-on: ubuntu-latest
    if: ${{ vars.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-cloudflare
          path: cauto-frontend/dist

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy cauto-frontend/dist --project-name=opsonata-platform --branch=main
