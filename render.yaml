services:
  - type: web
    name: fleetcc-backend
    env: node
    plan: free
    rootDir: cauto-backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GPS_PROVIDER
        value: mock
      - key: JWT_SECRET
        generateValue: true          # Render generates a secure random value
      - key: FRONTEND_URL
        sync: false                  # Set manually: your GitHub Pages URL e.g. https://argali.github.io/FleetCC
      - key: SEED_SUPERADMIN_EMAIL
        sync: false                  # e.g. superadmin@yourdomain.com
      - key: SEED_SUPERADMIN_PASSWORD
        sync: false                  # Strong password — never use the default
      - key: SEED_OFFICINA_PASSWORD
        sync: false                  # Strong password — never use the default
      - key: SEED_ADMIN_PASSWORD
        sync: false                  # Strong password — never use the default
      - key: PLANNING_DATA_DIR
        value: /var/data/planning    # Persistent disk mount path — see Disks section below
    disk:
      name: planning-data
      mountPath: /var/data
      sizeGB: 1
