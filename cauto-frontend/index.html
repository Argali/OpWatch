<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4ade80" />
    <title>OpWatch</title>
<style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: #060f06; }</style>
  </head>
  <body>
    <!-- Lightweight loading screen (removed once React mounts) -->
    <div id="fc-loader" style="position:fixed;inset:0;background:#060f06;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;">
      <div style="color:#4ade80;font-size:11px;margin-bottom:14px;letter-spacing:3px;opacity:0.5;font-family:monospace;font-weight:600;">OpWatch</div>
      <div style="color:#4ade80;font-size:12px;opacity:0.6;font-family:monospace;margin-bottom:6px;">Caricamento</div>
      <div id="fc-spin" style="color:#4ade80;font-size:52px;font-weight:700;line-height:1;font-family:monospace;">|</div>
    </div>
    <script>
      (function(){
        var chars=['|','/','-','\\'];
        var i=0;
        var el=document.getElementById('fc-spin');
        var t=setInterval(function(){ el.textContent=chars[i=(i+1)%4]; },120);
        window.__fcHideLoader=function(){
          clearInterval(t);
          var s=document.getElementById('fc-loader');
          if(!s)return;
          s.style.transition='opacity 0.35s ease';
          s.style.opacity='0';
          setTimeout(function(){ if(s.parentNode)s.parentNode.removeChild(s); },380);
        };
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
